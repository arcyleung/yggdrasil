# PoC: Qdrant only. Yggdrasil MCP server runs on host.
# Optional API key: set QDRANT_API_KEY in the environment (or .env) to enable
# Qdrant service API key auth. Clients must send the same key via QDRANT_API_KEY
# in Yggdrasil config. Leave unset for open local-only PoC (default).
services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: yggdrasil-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      # Only applied when QDRANT_API_KEY is set in the compose environment
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - yggdrasil_qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  yggdrasil_qdrant_data:
